<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h1>Login Básico</h1>
</body>
</html>

<form>
    <label>Usuario:</label>
    <input type="text" name="usuario">

    <label>Contraseña:</label>
    <input type="password" name="password">

    <button type="submit">Ingresar</button>
</form>

<script>
document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();
    alert("Login enviado");
});
</script>
